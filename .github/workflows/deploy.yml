name: Docker Deploy

# ============================================================================
# Docker-based Server Deployment
# ============================================================================
# Builds the Docker image, transfers the tar to the server via SCP,
# and executes the deployment script via SSH.
#
# Required secrets (set in GitHub repo Settings > Secrets and variables > Actions):
#   - SERVER_HOST:      Target server IP/hostname
#   - SERVER_USER:      SSH username
#   - SSH_PRIVATE_KEY:  SSH private key for authentication
# ============================================================================

on:
  push:
    branches:
      - master

env:
  SERVICE_NAME: sast-link-next
  REGISTRY_PREFIX: sast
  TAR_FILE_NAME: sast-link-next-image.tar

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Get short Git commit hash
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and export to tar
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: |
            ${{ env.REGISTRY_PREFIX }}/${{ env.SERVICE_NAME }}:latest
            ${{ env.REGISTRY_PREFIX }}/${{ env.SERVICE_NAME }}:${{ steps.vars.outputs.sha_short }}
          outputs: type=docker,dest=./${{ env.TAR_FILE_NAME }}

      - name: Transfer image and compose file to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: |
            ${{ env.TAR_FILE_NAME }}
            docker-compose.yml
          target: "/data/${{ env.SERVICE_NAME }}/"

      - name: Execute deployment script on server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            SERVICE_DIR="/data/${{ env.SERVICE_NAME }}"
            IMAGE_NAME="${{ env.REGISTRY_PREFIX }}/${{ env.SERVICE_NAME }}"
            TAR_FILE="${{ env.TAR_FILE_NAME }}"
            NEW_VERSION_TAG="${{ steps.vars.outputs.sha_short }}"

            cd ${SERVICE_DIR}

            echo "deploy start, version: ${NEW_VERSION_TAG}"

            echo "loading new image from ${TAR_FILE}..."
            docker load -i ${TAR_FILE}

            echo "handling image backup & rotation..."
            if docker image inspect "${IMAGE_NAME}:current" >/dev/null 2>&1; then
              if docker image inspect "${IMAGE_NAME}:backup" >/dev/null 2>&1; then
                echo "  - removing old backup image..."
                docker rmi "${IMAGE_NAME}:backup"
              fi
              echo "  - tagging current as backup..."
              docker tag "${IMAGE_NAME}:current" "${IMAGE_NAME}:backup"
            else
              echo "  - no current image found, skipping backup (first deploy)"
            fi

            echo "tagging new image (${NEW_VERSION_TAG}) as current..."
            docker tag "${IMAGE_NAME}:${NEW_VERSION_TAG}" "${IMAGE_NAME}:current"

            echo "starting services with docker compose..."
            docker compose up -d --remove-orphans

            echo "cleaning up temporary files and images..."
            rm ${TAR_FILE}
            docker rmi "${IMAGE_NAME}:latest"
            docker image prune -f

            echo "deploy success! running version: ${NEW_VERSION_TAG}"
