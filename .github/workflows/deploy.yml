name: Docker Deploy

# ============================================================================
# Docker-based Server Deployment
# ============================================================================
# Builds the Docker image, transfers the tar to the server via SCP,
# and executes the deployment script via SSH.
#
# Required secrets (set in GitHub repo Settings > Secrets and variables > Actions):
#   - SERVER_HOST:      Target server IP/hostname
#   - SERVER_USER:      SSH username
#   - SSH_PRIVATE_KEY:  SSH private key for authentication
# ============================================================================

on:
  push:
    branches:
      - master

env:
  SERVICE_NAME: sast-link-next
  REGISTRY_PREFIX: sast
  TAR_FILE_NAME: sast-link-next-image.tar

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Get short Git commit hash
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and export to tar
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: |
            ${{ env.REGISTRY_PREFIX }}/${{ env.SERVICE_NAME }}:latest
            ${{ env.REGISTRY_PREFIX }}/${{ env.SERVICE_NAME }}:${{ steps.vars.outputs.sha_short }}
          outputs: type=docker,dest=./${{ env.TAR_FILE_NAME }}

      - name: Transfer image to server
        uses: appleboy/scp-action@master
        timeout-minutes: 30
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: ${{ env.TAR_FILE_NAME }}
          target: "/data/${{ env.SERVICE_NAME }}/"

      - name: Transfer compose file to server
        uses: appleboy/scp-action@master
        timeout-minutes: 3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: docker-compose.yml
          target: "/data/${{ env.SERVICE_NAME }}/"

      - name: Execute deployment script on server
        uses: appleboy/ssh-action@master
        timeout-minutes: 15
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            SERVICE_DIR="/data/${{ env.SERVICE_NAME }}"
            IMAGE_NAME="${{ env.REGISTRY_PREFIX }}/${{ env.SERVICE_NAME }}"
            TAR_FILE="${{ env.TAR_FILE_NAME }}"
            NEW_VERSION_TAG="${{ steps.vars.outputs.sha_short }}"
            CONTAINER_NAME="${{ env.SERVICE_NAME }}"
            HEALTH_CHECK_RETRIES=20
            HEALTH_CHECK_INTERVAL=3

            cd ${SERVICE_DIR}

            echo "deploy start, version: ${NEW_VERSION_TAG}"

            echo "loading new image from ${TAR_FILE}..."
            docker load -i ${TAR_FILE}

            echo "handling image backup & rotation..."
            if docker image inspect "${IMAGE_NAME}:current" >/dev/null 2>&1; then
              if docker image inspect "${IMAGE_NAME}:backup" >/dev/null 2>&1; then
                echo "  - removing old backup image..."
                docker rmi "${IMAGE_NAME}:backup"
              fi
              echo "  - tagging current as backup..."
              docker tag "${IMAGE_NAME}:current" "${IMAGE_NAME}:backup"
            else
              echo "  - no current image found, skipping backup (first deploy)"
            fi

            echo "tagging new image (${NEW_VERSION_TAG}) as current..."
            docker tag "${IMAGE_NAME}:${NEW_VERSION_TAG}" "${IMAGE_NAME}:current"

            echo "starting services with docker compose..."
            docker compose up -d --remove-orphans

            echo "waiting for container to become healthy..."
            HEALTHY=0
            for i in $(seq 1 ${HEALTH_CHECK_RETRIES}); do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' ${CONTAINER_NAME} 2>/dev/null || echo "starting")
              if [ "$STATUS" = "healthy" ]; then
                HEALTHY=1
                echo "  container is healthy"
                break
              fi
              echo "  attempt $i/${HEALTH_CHECK_RETRIES}: status=$STATUS, waiting ${HEALTH_CHECK_INTERVAL}s..."
              sleep ${HEALTH_CHECK_INTERVAL}
            done

            if [ "$HEALTHY" -eq 0 ]; then
              echo "ERROR: container failed to become healthy, rolling back..."
              if docker image inspect "${IMAGE_NAME}:backup" >/dev/null 2>&1; then
                echo "  - tagging backup as current..."
                docker tag "${IMAGE_NAME}:backup" "${IMAGE_NAME}:current"
                docker compose up -d --remove-orphans
                echo "  - rollback complete"
              else
                echo "  - no backup image available, manual intervention required"
              fi
              rm -f ${TAR_FILE}
              exit 1
            fi

            echo "cleaning up temporary files and images..."
            rm ${TAR_FILE}
            docker rmi "${IMAGE_NAME}:latest" 2>/dev/null || true
            docker images --filter "dangling=true" --format "{{.ID}}" | xargs -r docker rmi 2>/dev/null || true

            echo "deploy success! running version: ${NEW_VERSION_TAG}"
