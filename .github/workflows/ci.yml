name: CI/CD Pipeline

# ============================================================================
# CI/CD Pipeline Orchestrator
# ============================================================================
# This is the main CI/CD pipeline that orchestrates smaller, modular workflows.
# Each workflow can also be run independently for better maintainability.
#
# Workflow Structure:
# ├── quality.yml     - Code quality & security checks (ESLint, TypeScript, audit)
# ├── test.yml        - Test suite with coverage & Next.js build
# ├── deploy.yml      - Docker deploy (master push only, requires secrets)
# └── release.yml     - GitHub release creation (triggered by version tags)
#
# Quality and test run on every push/PR. Deploy runs after both pass,
# but only on push to master. See CI_CD.md for setup instructions.
# ============================================================================

on:
  push:
    branches:
      - master
      - develop
  pull_request:
    branches:
      - master
      - develop

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Step 1: Code Quality Checks
  quality:
    name: Quality
    uses: ./.github/workflows/quality.yml

  # Step 2: Test Suite & Build
  test:
    name: Test
    uses: ./.github/workflows/test.yml

  # Step 3: Deploy (master push only)
  deploy:
    name: Deploy
    needs: [quality, test]
    if: github.ref == 'refs/heads/master'
    uses: ./.github/workflows/deploy.yml
    secrets: inherit
